<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Marketing — Nova Stage Immigration</title>
<style>
:root{
  --blue:#1d4ed8;--blue-light:#eff6ff;--blue-mid:#dbeafe;
  --gold:#c8922a;--green:#16a34a;--red:#dc2626;
  --gray:#6b7280;--border:#e5e7eb;--radius:8px;
  --shadow:0 1px 3px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#f9fafb;color:#111827}
.brand-header{background:#fff;border-bottom:3px solid var(--gold);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.brand-title{font-weight:700;font-size:16px;color:#111827}
.brand-rcic{font-size:13px;color:var(--gray)}
.container{max-width:1200px;margin:24px auto;padding:0 20px}
.section{background:#fff;border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden}
.section-header{background:var(--blue-light);border-bottom:1px solid var(--blue-mid);padding:12px 16px;font-weight:600;color:var(--blue);font-size:13px}
.section-body{padding:20px}
.form-row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.form-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:140px}
label{font-size:12px;color:var(--gray);font-weight:500}
input,select{border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:13px;width:100%;outline:none;transition:border .15s}
input:focus,select:focus{border-color:var(--blue)}
.btn{padding:9px 20px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover:not(:disabled){background:#1e40af}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-copy{background:#f3f4f6;color:#374151;border:1px solid var(--border);padding:5px 12px;font-size:12px;font-weight:500;border-radius:6px;cursor:pointer}
.btn-copy:hover{background:#e5e7eb}
.btn-copy.copied{background:#f0fdf4;color:var(--green);border-color:#bbf7d0}
.status{padding:12px 16px;border-radius:6px;font-size:13px;margin-bottom:16px;display:none}
.status.info{background:#eff6ff;color:var(--blue);border:1px solid var(--blue-mid)}
.status.success{background:#f0fdf4;color:var(--green);border:1px solid #bbf7d0}
.status.error{background:#fef2f2;color:var(--red);border:1px solid #fecaca}
.status.warn{background:#fffbeb;color:#92400e;border:1px solid #fde68a}
.results-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.platform-card{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.platform-header{padding:10px 14px;font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.platform-header.script{background:#f5f3ff;color:#5b21b6}
.platform-header.weixin{background:#f0fdf4;color:#15803d}
.platform-header.xiaohongshu{background:#fff1f2;color:#be123c}
.platform-header.moments{background:#fffbeb;color:#92400e}
.platform-body{padding:14px;font-size:13px;line-height:1.6}
.field-label{font-size:11px;color:var(--gray);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;margin-top:10px}
.field-label:first-child{margin-top:0}
.field-value{color:#111827;white-space:pre-wrap;word-break:break-word}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.tag{background:#f3f4f6;border:1px solid var(--border);border-radius:12px;padding:2px 8px;font-size:11px;color:#374151}
.copy-row{padding:10px 14px;border-top:1px solid var(--border);display:flex;justify-content:flex-end}
.history-list{list-style:none;padding:0}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:13px}
.history-item:last-child{border-bottom:none}
.history-link{color:var(--blue);cursor:pointer;text-decoration:none;background:none;border:none;font-size:13px;padding:0;text-align:left}
.history-link:hover{text-decoration:underline}
.history-meta{color:var(--gray);font-size:12px}
.hidden{display:none}
@media(max-width:900px){.results-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.results-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="brand-header">
  <div class="brand-title">Marketing — Nova Stage Immigration</div>
  <div class="brand-rcic">Yueheng Gao, RCIC | #R534273</div>
</div>

<div class="container">

<!-- 触发表单 -->
<div class="section">
  <div class="section-header">生成文案</div>
  <div class="section-body">
    <div class="form-row">
      <div class="form-group" style="max-width:220px">
        <label>内容类型</label>
        <select id="mode" onchange="onModeChange()">
          <option value="news">今日移民新闻</option>
          <option value="case">客户成功案例</option>
          <option value="topic">指定主题 / 判例</option>
        </select>
      </div>
      <div class="form-group hidden" id="clientNameGroup">
        <label>客户姓名</label>
        <input type="text" id="clientName" placeholder="例如：Jason Wong">
      </div>
      <div class="form-group hidden" id="topicGroup">
        <label>内容角度 / 关键词</label>
        <input type="text" id="topicInput" placeholder="例如：CEC被拒后司法审查，哪些法律理由最有效">
        <div style="margin-top:6px;display:flex;gap:14px;align-items:center;">
          <label style="font-size:12px;color:#555;font-weight:500;">搜索范围：</label>
          <label style="font-size:12px;color:#374151;cursor:pointer;display:flex;align-items:center;gap:4px;">
            <input type="radio" name="searchType" value="caselaw" checked style="accent-color:#7c3aed;">
            ⚖️ 判例+法规
          </label>
          <label style="font-size:12px;color:#374151;cursor:pointer;display:flex;align-items:center;gap:4px;">
            <input type="radio" name="searchType" value="news" style="accent-color:#7c3aed;">
            📰 新闻
          </label>
        </div>
      </div>
      <div>
        <button class="btn btn-primary" id="generateBtn" onclick="generate()">生成文案</button>
      </div>
    </div>
    <div class="status" id="status"></div>
  </div>
</div>

<!-- 结果 -->
<div class="section" id="resultsSection" style="display:none">
  <div class="section-header">生成结果</div>
  <div class="section-body">
    <div class="results-grid" id="resultsGrid"></div>
  </div>
</div>

<!-- 内容创作工作台 -->
<div class="section" id="workshopSection">
  <div class="section-header">内容创作工作台</div>
  <div class="section-body">

    <!-- Step 1: 角度输入 -->
    <div id="ws-step1">
      <div style="margin-bottom:10px;">
        <label style="font-size:12px;color:var(--gray);font-weight:500;display:block;margin-bottom:4px;">你的内容角度</label>
        <textarea id="wsAngle" rows="3" placeholder="例如：借EE改革热度，讲CEC被拒后司法审查的合理性标准，用法官推翻IRCC决定的案例说明法律逻辑"
          style="width:100%;border:1px solid var(--border);border-radius:6px;padding:10px;font-size:13px;line-height:1.6;resize:vertical;outline:none;font-family:inherit;"
          onfocus="this.style.borderColor='var(--blue)'" onblur="this.style.borderColor='var(--border)'"></textarea>
      </div>
      <div style="margin-bottom:10px;">
        <label style="font-size:12px;color:var(--gray);font-weight:500;display:block;margin-bottom:4px;">
          判例关键词（英文，可选）
          <span style="font-weight:400;color:#9ca3af;margin-left:4px;">留空则自动从角度中提取</span>
        </label>
        <input type="text" id="wsCaseLawKeywords" placeholder="例如：CEC FSW Express Entry judicial review reasonableness 2024 2025"
          style="width:100%;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:13px;">
      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:#374151;cursor:pointer;">
          <input type="checkbox" id="wsAddNews" onchange="document.getElementById('wsNewsRow').style.display=this.checked?'flex':'none'"
            style="accent-color:var(--blue);width:14px;height:14px;">
          加入时事背景
        </label>
        <div id="wsNewsRow" style="display:none;align-items:center;gap:8px;flex:1;min-width:200px;">
          <label style="font-size:12px;color:var(--gray);white-space:nowrap;">新闻话题：</label>
          <input type="text" id="wsNewsTopic" placeholder="例如：Express Entry reform 2026"
            style="flex:1;border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:13px;">
        </div>
      </div>
      <button class="btn btn-primary" id="wsSearchBtn" onclick="wsSearch()">搜素材</button>
      <div class="status" id="ws-status"></div>
    </div>

    <!-- Step 2: 素材选择（搜索后出现） -->
    <div id="ws-step2" style="display:none;margin-top:20px;border-top:1px solid var(--border);padding-top:20px;">
      <div style="font-size:13px;font-weight:600;color:#374151;margin-bottom:12px;">选择要使用的素材（可多选）</div>
      <div id="ws-caselaw-section"></div>
      <div id="ws-news-section"></div>
      <div style="margin-top:16px;">
        <button class="btn btn-primary" id="wsAssembleBtn" onclick="wsAssemble()">组合提示词</button>
        <span style="font-size:12px;color:var(--gray);margin-left:10px;">会自动抓取所选判例/新闻的完整原文</span>
      </div>
    </div>

    <!-- Step 3: 提示词预览+编辑（组合后出现） -->
    <div id="ws-step3" style="display:none;margin-top:20px;border-top:1px solid var(--border);padding-top:20px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div style="font-size:13px;font-weight:600;color:#374151;">提示词预览（可直接编辑）</div>
        <div style="display:flex;gap:8px;">
          <button class="btn-copy" id="wsResetBtn" onclick="wsReset()" style="font-size:12px;">重新选材</button>
          <button class="btn btn-primary" onclick="wsSendToClaude()" style="font-size:12px;padding:7px 14px;">发送到 Claude.ai</button>
        </div>
      </div>
      <textarea id="wsPromptPreview" rows="20"
        style="width:100%;border:1px solid var(--border);border-radius:6px;padding:12px;font-size:12px;line-height:1.7;resize:vertical;outline:none;font-family:'Courier New',monospace;background:#fafafa;color:#111;"
        onfocus="this.style.borderColor='var(--blue)'" onblur="this.style.borderColor='var(--border)'"></textarea>
    </div>

  </div>
</div>

<!-- 历史记录 -->
<div class="section">
  <div class="section-header">历史记录（最近 30 条）</div>
  <div class="section-body">
    <ul class="history-list" id="historyList">
      <li style="color:var(--gray);font-size:13px;padding:8px 0">加载中…</li>
    </ul>
  </div>
</div>

</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxY7hR2ok5V4FDnSpsykPE_13a8bgLIE6dqesEjqXsLKq5GIceB5g7NVQbWDPI2MZCr/exec';

function onModeChange() {
  const mode = document.getElementById('mode').value;
  document.getElementById('clientNameGroup').classList.toggle('hidden', mode !== 'case');
  document.getElementById('topicGroup').classList.toggle('hidden', mode !== 'topic');
}

function setStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.textContent = msg;
  el.style.display = 'block';
}

async function generate() {
  const mode = document.getElementById('mode').value;
  const clientName = document.getElementById('clientName').value.trim();
  const topic = document.getElementById('topicInput').value.trim();

  if (mode === 'case' && !clientName) { setStatus('error', '请输入客户姓名'); return; }
  if (mode === 'topic' && !topic)     { setStatus('error', '请输入主题或关键词'); return; }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;

  const steps = {
    news:  ['⏳ 正在搜索今日移民新闻…', '✍️ 正在生成文案…'],
    case:  ['⏳ 正在读取客户档案…',     '✍️ 正在生成文案…'],
    topic: ['⏳ 正在搜索相关资料…',     '✍️ 正在生成文案…']
  };
  setStatus('info', steps[mode][0]);
  const timer = setTimeout(() => { if (btn.disabled) setStatus('info', steps[mode][1]); }, 5000);

  try {
    const payload = { mode };
    if (mode === 'case')  payload.clientName = clientName;
    if (mode === 'topic') {
      payload.topic = topic;
      const st = document.querySelector('input[name="searchType"]:checked');
      payload.searchType = st ? st.value : 'caselaw';
    }

    const res = await fetch(GAS_URL + '?data=' + encodeURIComponent(JSON.stringify(payload)));
    const data = await res.json();
    clearTimeout(timer);

    if (!data.ok) {
      if (data.reason === 'no_content') {
        setStatus('info', '📋 今日暂无新资讯');
      } else {
        setStatus('error', '生成失败：' + (data.error || '未知错误'));
      }
      btn.disabled = false;
      return;
    }

    // Mode A: news digest — show list for user to pick
    if (data.mode === 'news_digest') {
      setStatus('success', '✅ 找到 ' + data.items.length + ' 条资讯，选择感兴趣的发送到 Claude.ai / NotebookLM');
      renderNewsDigest(data.items);
      loadHistory();
      btn.disabled = false;
      return;
    }
    if (data.mode === 'topic_digest') {
      const isCaseLaw = data.subtype === 'caselaw';
      const label = isCaseLaw ? '判例/法规素材' : '相关资料';
      setStatus('success', '✅ 找到 ' + data.items.length + ' 条' + label + '，选择感兴趣的发送到 Claude.ai');
      renderNewsDigest(data.items, isCaseLaw);
      loadHistory();
      btn.disabled = false;
      return;
    }
    if (data.mode === 'case_digest') {
      setStatus('success', '✅ 已读取客户档案：' + escHtml(data.clientName));
      renderCaseDigest(data);
      loadHistory();
      btn.disabled = false;
      return;
    }

    setStatus('success', '✅ 文案生成完成');
    renderResults(data.content, data.sources);
    loadHistory();
  } catch (err) {
    clearTimeout(timer);
    setStatus('error', '请求失败：' + err.message);
  }
  btn.disabled = false;
}

const NLM_PROMPT_TEMPLATE = `请帮我为以下移民内容生成营销文案。

【我的背景】
我叫 Steven，是加拿大持牌移民顾问（RCIC R534273）。
账号定位：以法律逻辑重构移民申请方案，专注疑难杂症与复杂情况处理。
目标受众：在加华人移民群体，正在申请或遇到移民问题的人。

【内容风格（严格参照以下结构）】

**结构模板（适用于口播文案）：**
1. 钩子开场（1-2句）：用冲突/反转/悬念抓眼球。例："父母移民被坑，竟是因为一个词" / "配偶工签被拒2次，我是如何翻案的"
2. 案例还原（3-5句）：描述真实情境，让读者代入当事人处境
3. 法律分析（核心，用 ✅ 分点）：引用具体法规、判例或移民局文件，说清楚法律依据
4. 结果（1句）：胜诉/获批/翻案，带 🎉
5. 💡 核心教训（1-2句）：提炼实际操作建议
6. CTA（1句）：自然引导私信，不推销。例："正在办理？有疑问欢迎私信我"

**语气：** 像有法律背景的朋友在分析案子，专业但不卖弄，有温度不煽情
**不要：** 泛泛而谈、说废话、用"大家好我是Steven"开头、用感叹号堆砌情绪
**Emoji规则：** 仅用 🇨🇦 ✅ 💡 🎉，每篇不超过5个，不在正文随意插入

【原文内容】
{ARTICLE_CONTENT}

【请生成】
1. 视频口播文案（300-400字，用上面的结构模板，直接切入，不要用"大家好"开头）
2. 小红书 / 视频号图文（各平台相同内容）：
   - 封面词：≤10字，吸睛，可用数字/悬念/反转
   - 标题：≤10字，与封面词风格一致
   - 正文：120-180字，浓缩版，保留法律细节
   - 标签：5-8个（法律专业词 + 大众移民词混合，如 #RCIC #加拿大移民 #移民避坑）
3. 朋友圈（50-80字，保留核心冲突和结论）`;

const NLM_CHAT_QUESTION = '请用中文，按以下结构生成营销文案：\n1. 视频口播文案（300-400字）：钩子开场→案例还原→法律分析(✅分点)→结果🎉→💡核心教训→CTA，直接切入不要用"大家好"开头\n2. 小红书/视频号图文：\n   封面词（≤10字，吸睛）\n   标题（≤10字）\n   正文（120-180字，保留法律细节）\n   标签（5-8个，如 #RCIC #加拿大移民 #移民避坑）\n3. 朋友圈（50-80字，保留核心冲突）\n语气：像有法律背景的朋友在分析案子，专业但不卖弄，有温度不煽情。';

async function useAsTopicForAI(url, title, target, cachedSnippet) {
  const btn = event.target;
  const origText = btn.textContent;
  btn.disabled = true;

  try {
    if (target === 'nlm') {
      // NotebookLM: copy URL, open NLM, show question text in a banner
      await navigator.clipboard.writeText(url);
      window.open('https://notebooklm.google.com', '_blank');
      btn.textContent = '✅ URL已复制 → 添加为来源';
      showNlmBanner(NLM_CHAT_QUESTION);
    } else {
      // Claude.ai: extract full article and paste complete prompt
      btn.textContent = '抓取中...';
      let articleContent;
      const isXPost = /^https?:\/\/(x|twitter)\.com\//i.test(url);
      if (isXPost && cachedSnippet) {
        articleContent = '【推文原文】\n' + cachedSnippet;
      } else {
        const res = await fetch(GAS_URL + '?action=extract&url=' + encodeURIComponent(url));
        const data = await res.json();
        articleContent = data.ok ? data.content : ('（抓取失败，请直接使用原文链接）\n' + url);
      }
      const prompt = NLM_PROMPT_TEMPLATE.replace('{ARTICLE_CONTENT}',
        '原文链接：' + url + '\n\n' + articleContent.slice(0, 6000));
      await navigator.clipboard.writeText(prompt);
      window.open('https://claude.ai/new', '_blank');
      btn.textContent = '✅ 已复制 → Claude.ai 已打开，直接粘贴即可';
    }
  } catch (err) {
    btn.textContent = '❌ 失败：' + err.message;
  }
  setTimeout(() => { btn.textContent = origText; btn.disabled = false; }, 6000);
}

// Store items in JS array so buttons can reference by index (safe for any content)
let _digestItems = [];

function showNlmBanner(question) {
  let banner = document.getElementById('nlm-banner');
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'nlm-banner';
    banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#1a73e8;color:#fff;padding:12px 16px;font-size:13px;display:flex;align-items:flex-start;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.3);';
    document.body.prepend(banner);
  }
  banner.innerHTML = `
    <div style="flex:1;">
      <div style="font-weight:700;margin-bottom:6px;">📋 NotebookLM 第二步：添加来源后，把以下问句粘贴到对话框</div>
      <div id="nlm-q" style="background:rgba(255,255,255,.15);border-radius:4px;padding:8px 10px;white-space:pre-wrap;line-height:1.5;">${escHtml(question)}</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;">
      <button onclick="copyNlmQuestion()" style="padding:6px 14px;background:#fff;color:#1a73e8;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;">复制问句</button>
      <button onclick="document.getElementById('nlm-banner').remove()" style="padding:6px 14px;background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:4px;cursor:pointer;font-size:12px;">关闭</button>
    </div>`;
}

async function copyNlmQuestion() {
  try {
    const text = document.getElementById('nlm-q').textContent;
    await navigator.clipboard.writeText(text);
    const btn = event.target;
    btn.textContent = '✅ 已复制';
    setTimeout(() => { btn.textContent = '复制问句'; }, 2000);
  } catch(e) {}
}

function renderCaseDigest(data) {
  _digestItems = [];
  const grid = document.getElementById('resultsGrid');
  grid.innerHTML = '';
  document.getElementById('resultsSection').style.display = '';
  document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });

  const casePrompt = `请根据以下客户档案，为Nova Stage Immigration（Steven Gao, RCIC #R534273）生成营销文案：\n\n` +
    data.rawText.slice(0, 5000) +
    `\n\n请生成（严格按以下格式）：\n1. 视频口播文案（300-400字）：钩子开场 → 案例还原 → 法律分析(✅分点) → 结果🎉 → 💡核心教训 → CTA，直接切入，不要用"大家好"开头\n` +
    `2. 小红书/视频号图文：\n   封面词（≤10字，吸睛）\n   标题（≤10字）\n   正文（120-180字，保留法律细节）\n   标签（5-8个，如 #RCIC #加拿大移民 #移民避坑）\n` +
    `3. 朋友圈（50-80字，保留核心冲突和结论）\n\n` +
    `语气：像有法律背景的朋友分析案子，专业但不卖弄，有温度不煽情，Emoji只用 🇨🇦 ✅ 💡 🎉，每篇不超过5个`;

  const container = document.createElement('div');
  container.style.cssText = 'grid-column:1/-1;';
  const card = document.createElement('div');
  card.style.cssText = 'background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:20px;';
  const preview = escHtml(data.rawText.slice(0, 800)) + (data.rawText.length > 800 ? '\n…（共 ' + data.rawText.length + ' 字）' : '');
  card.innerHTML = `
    <div style="font-weight:600;font-size:14px;margin-bottom:12px;color:#111;">📋 ${escHtml(data.clientName)} 案例档案</div>
    <div style="font-size:12px;color:#555;background:#f9fafb;border-left:3px solid #d1d5db;padding:10px 12px;border-radius:0 4px 4px 0;white-space:pre-wrap;max-height:200px;overflow-y:auto;margin-bottom:16px;">${preview}</div>
    <button id="caseToClaude" style="padding:8px 18px;background:#7c3aed;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;">→ 发送到 Claude.ai 生成文案</button>`;
  card.querySelector('#caseToClaude').addEventListener('click', async function() {
    const btn = this;
    btn.textContent = '复制中...';
    btn.disabled = true;
    try {
      await navigator.clipboard.writeText(casePrompt);
      window.open('https://claude.ai/new', '_blank');
      btn.textContent = '✅ 已复制 → Claude.ai 已打开，直接粘贴即可';
    } catch (e) {
      btn.textContent = '❌ 失败：' + e.message;
    }
    setTimeout(() => { btn.textContent = '→ 发送到 Claude.ai 生成文案'; btn.disabled = false; }, 5000);
  });
  container.appendChild(card);
  grid.appendChild(container);
}

function renderNewsDigest(items, isCaseLaw) {
  _digestItems = items || [];
  const grid = document.getElementById('resultsGrid');
  grid.innerHTML = '';
  document.getElementById('resultsSection').style.display = '';
  document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
  if (!items || items.length === 0) {
    grid.innerHTML = '<p style="color:#666;padding:16px;">暂无资讯</p>';
    return;
  }
  const container = document.createElement('div');
  container.style.cssText = 'grid-column:1/-1;display:flex;flex-direction:column;gap:12px;';
  items.forEach(function(item, idx) {
    const card = document.createElement('div');
    const isCaseItem = isCaseLaw && item.sourceType === 'caselaw';
    const isRegItem  = isCaseLaw && item.sourceType === 'regulation';
    const borderColor = isCaseItem ? '#7c3aed' : isRegItem ? '#0891b2' : '#d1d5db';
    card.style.cssText = 'background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:16px;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;';
    let dateLabel = '';
    if (item.published_date) {
      const raw = item.published_date.replace('Z','').replace('T',' ');
      dateLabel = raw.slice(0, 16) + (item.published_date.endsWith('Z') ? ' UTC' : '');
    }
    const typeBadge = isCaseItem
      ? '<span style="background:#ede9fe;color:#6d28d9;border-radius:4px;padding:1px 6px;font-weight:600;">⚖️ 判例</span>'
      : isRegItem
        ? '<span style="background:#e0f2fe;color:#0369a1;border-radius:4px;padding:1px 6px;font-weight:600;">📋 法规</span>'
        : '';
    card.innerHTML = `
      <div style="flex:1;min-width:0;">
        <a href="${escHtml(item.url)}" target="_blank" rel="noopener"
           style="font-weight:600;color:#1a73e8;font-size:14px;text-decoration:none;display:block;margin-bottom:6px;">${escHtml(item.title)}</a>
        <div style="font-size:11px;color:#888;margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          ${typeBadge}
          <span style="background:#f3f4f6;border-radius:4px;padding:1px 6px;">${escHtml(item.source)}</span>
          ${dateLabel ? '<span style="color:#ef4444;font-weight:600;">🕐 ' + escHtml(dateLabel) + '</span>' : ''}
        </div>
        <div style="font-size:12px;color:#374151;line-height:1.6;background:#f9fafb;border-left:3px solid ${borderColor};padding:8px 10px;border-radius:0 4px 4px 0;">${escHtml((item.snippet||'').slice(0,200) + ((item.snippet||'').length > 200 ? '…' : ''))}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;">
        <button data-idx="${idx}" data-target="claude"
          style="white-space:nowrap;padding:7px 14px;background:#7c3aed;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;">
          → Claude.ai（推荐）
        </button>
        <button data-idx="${idx}" data-target="nlm"
          style="white-space:nowrap;padding:7px 14px;background:#1a73e8;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;">
          → NotebookLM
        </button>
      </div>`;
    // Attach click handlers via JS (no inline escaping issues)
    card.querySelectorAll('button[data-idx]').forEach(btn => {
      btn.addEventListener('click', function() {
        const i = parseInt(this.dataset.idx);
        const t = this.dataset.target;
        const it = _digestItems[i];
        useAsTopicForAI(it.url, it.title, t, it.snippet || '');
      });
    });
    container.appendChild(card);
  });
  grid.appendChild(container);
}

function renderResults(content, sources) {
  const grid = document.getElementById('resultsGrid');
  grid.innerHTML = '';

  // Show source links from Tavily (authoritative, not LLM-generated)
  if (sources && sources.length) {
    const srcDiv = document.createElement('div');
    srcDiv.style.cssText = 'grid-column:1/-1;font-size:12px;color:#555;margin-bottom:8px;line-height:1.8;';
    srcDiv.innerHTML = '📰 <strong>原文来源（可点击核实）：</strong><br>' +
      sources.map(s => `<a href="${escHtml(s.url)}" target="_blank" rel="noopener" style="color:#1a73e8;margin-right:8px;">${escHtml(s.title || s.url)}</a>`).join('<br>');
    grid.appendChild(srcDiv);
  }

  const platforms = [
    {
      key: 'script', cls: 'script', label: '🎬 口播文案',
      fields: [{ label: '文案', key: 'text' }],
      copyFn: c => c.text
    },
    {
      key: 'weixin', cls: 'weixin', label: '📱 视频号',
      fields: [{ label: '封面词', key: 'cover' }, { label: '标题', key: 'title' }, { label: '正文', key: 'body' }],
      copyFn: c => `【${c.cover}】${c.title}\n\n${c.body}\n\n${(c.tags||[]).map(t=>'#'+t).join(' ')}`
    },
    {
      key: 'xiaohongshu', cls: 'xiaohongshu', label: '📕 小红书',
      fields: [{ label: '封面词', key: 'cover' }, { label: '标题', key: 'title' }, { label: '正文', key: 'body' }],
      copyFn: c => `${c.title}\n\n${c.body}\n\n${(c.tags||[]).map(t=>'#'+t).join(' ')}`
    },
    {
      key: 'moments', cls: 'moments', label: '💬 朋友圈',
      fields: [{ label: '正文', key: 'body' }],
      copyFn: c => c.body
    }
  ];

  platforms.forEach(p => {
    const c = content[p.key];
    if (!c) return;

    let fieldsHtml = p.fields.map(f =>
      `<div class="field-label">${f.label}</div><div class="field-value">${escHtml(c[f.key] || '')}</div>`
    ).join('');

    if (c.tags && c.tags.length) {
      fieldsHtml += `<div class="field-label">标签</div><div class="tags">${c.tags.map(t=>`<span class="tag">#${escHtml(t)}</span>`).join('')}</div>`;
    }

    const card = document.createElement('div');
    card.className = 'platform-card';
    const copyContent = p.copyFn(c);
    card.innerHTML = `
      <div class="platform-header ${p.cls}">${p.label}</div>
      <div class="platform-body">${fieldsHtml}</div>
      <div class="copy-row"><button class="btn-copy" onclick="copyText(this, ${JSON.stringify(copyContent)})">复制</button></div>`;
    grid.appendChild(card);
  });

  document.getElementById('resultsSection').style.display = '';
  document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '已复制 ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000);
  });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function loadHistory() {
  try {
    const res = await fetch(GAS_URL + '?action=history');
    const data = await res.json();
    const list = document.getElementById('historyList');
    if (!data.ok || !data.history || !data.history.length) {
      list.innerHTML = '<li style="color:var(--gray);font-size:13px;padding:8px 0">暂无历史记录</li>';
      return;
    }
    window._history = data.history;
    list.innerHTML = data.history.map((h, i) => {
      const d = new Date(h.date).toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
      const modeLabel = { news:'新闻', case:'案例', topic:'主题' }[h.mode] || h.mode;
      return `<li class="history-item">
        <button class="history-link" onclick="loadHistoryItem(${i})">[${modeLabel}] ${escHtml(h.topic || '')}</button>
        <span class="history-meta">${d}</span>
      </li>`;
    }).join('');
  } catch (err) {
    document.getElementById('historyList').innerHTML = '<li style="color:var(--gray);font-size:13px;padding:8px 0">历史加载失败</li>';
  }
}

function loadHistoryItem(i) {
  const entry = (window._history || [])[i];
  if (!entry || !entry.result) return;
  if ((entry.mode === 'news' || entry.mode === 'topic') && Array.isArray(entry.result)) {
    renderNewsDigest(entry.result);
    setStatus('info', '已加载历史记录：' + escHtml(entry.topic || ''));
  } else if ((entry.mode === 'news' || entry.mode === 'topic') && typeof entry.result === 'string') {
    // Legacy format: titles saved as joined string, can't render as cards
    setStatus('warn', '旧格式记录无法还原卡片，请重新搜索。（' + escHtml(entry.topic || '') + '）');
    return;
  } else if (entry.mode === 'case' && typeof entry.result === 'string') {
    renderCaseDigest({ clientName: entry.topic.replace(' 成功案例', ''), rawText: entry.result });
    setStatus('info', '已加载历史记录：' + escHtml(entry.topic || ''));
  } else {
    renderResults(entry.result);
    setStatus('info', '已加载历史记录：' + escHtml(entry.topic || ''));
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

loadHistory();

// ===== 内容创作工作台 =====

let _wsAngle = '';
let _wsCaseLawItems = [];
let _wsNewsItems = [];

function wsSetStatus(type, msg) {
  const el = document.getElementById('ws-status');
  el.className = 'status ' + type;
  el.style.display = msg ? '' : 'none';
  el.textContent = msg;
}

async function wsSearch() {
  const angle = document.getElementById('wsAngle').value.trim();
  if (!angle) { wsSetStatus('error', '请先填写你的内容角度'); return; }

  const btn = document.getElementById('wsSearchBtn');
  btn.disabled = true;
  wsSetStatus('info', '⏳ 正在搜索相关判例…');
  document.getElementById('ws-step2').style.display = 'none';
  document.getElementById('ws-step3').style.display = 'none';

  const newsTopic = document.getElementById('wsAddNews').checked
    ? document.getElementById('wsNewsTopic').value.trim()
    : '';

  try {
    const caseLawKeywords = document.getElementById('wsCaseLawKeywords').value.trim();
    const payload = { mode: 'angle_search', angle, newsTopic, caseLawKeywords };
    const res = await fetch(GAS_URL + '?data=' + encodeURIComponent(JSON.stringify(payload)));
    const data = await res.json();

    if (!data.ok) { wsSetStatus('error', '搜索失败：' + (data.error || '未知错误')); btn.disabled = false; return; }

    _wsAngle = angle;
    _wsCaseLawItems = data.caseLawItems || [];
    _wsNewsItems    = data.newsItems    || [];

    const total = _wsCaseLawItems.length + _wsNewsItems.length;
    if (total === 0) { wsSetStatus('warn', '未找到相关素材，请调整角度描述后重试'); btn.disabled = false; return; }

    console.log('[ws] caseLawItems:', JSON.stringify(_wsCaseLawItems.slice(0,2)));
    console.log('[ws] newsItems:', JSON.stringify(_wsNewsItems.slice(0,2)));
    wsSetStatus('success', '✅ 找到 ' + _wsCaseLawItems.length + ' 条判例' + (_wsNewsItems.length ? '，' + _wsNewsItems.length + ' 条新闻' : '') + '，勾选要使用的素材');
    wsRenderItems();
    document.getElementById('ws-step2').style.display = '';
  } catch (err) {
    wsSetStatus('error', '网络错误：' + err.message);
  }
  btn.disabled = false;
}

function wsRenderItems() {
  function renderGroup(containerId, items, type) {
    const container = document.getElementById(containerId);
    if (!items || items.length === 0) { container.innerHTML = ''; return; }
    const label = type === 'caselaw' ? '⚖️ 判例素材' : '📰 时事背景';
    const borderColor = type === 'caselaw' ? '#7c3aed' : '#0891b2';
    const badgeBg = type === 'caselaw' ? '#ede9fe' : '#e0f2fe';
    const badgeColor = type === 'caselaw' ? '#6d28d9' : '#0369a1';
    let html = '<div style="font-size:12px;font-weight:600;color:' + badgeColor + ';margin-bottom:8px;">' + label + '</div>';
    html += '<div style="margin-bottom:16px;">';
    items.forEach(function(item, i) {
      const id = 'ws-' + type + '-' + i;
      html += '<div style="background:#fff;border:1px solid #e5e7eb;border-left:3px solid ' + borderColor + ';border-radius:6px;padding:12px 14px;margin-bottom:8px;cursor:pointer;" onclick="var cb=document.getElementById(\'' + id + '\');cb.checked=!cb.checked;">';
      html += '<div style="margin-bottom:8px;">';
      html += '<input type="checkbox" data-type="' + type + '" data-idx="' + i + '" id="' + id + '" style="accent-color:' + borderColor + ';cursor:pointer;margin-right:8px;" onclick="event.stopPropagation()">';
      html += '<a href="' + escHtml(item.url) + '" target="_blank" rel="noopener" style="font-size:13px;color:#1a73e8;font-weight:600;text-decoration:none;" onclick="event.stopPropagation()">' + escHtml(item.title || '(no title)') + '</a>';
      html += '</div>';
      html += '<div style="font-size:11px;color:#888;margin-bottom:4px;">' + escHtml(item.source || '') + '</div>';
      html += '<div style="font-size:12px;color:#374151;line-height:1.6;">' + escHtml((item.snippet || '').slice(0, 180)) + '</div>';
      html += '</div>';
    });
    html += '</div>';
    container.innerHTML = html;
  }
  renderGroup('ws-caselaw-section', _wsCaseLawItems, 'caselaw');
  renderGroup('ws-news-section',    _wsNewsItems,    'news');
}

async function wsAssemble() {
  // Collect checked items
  const checked = document.querySelectorAll('#ws-step2 input[type="checkbox"]:checked');
  if (checked.length === 0) { wsSetStatus('error', '请至少勾选一条素材'); return; }

  const selectedUrls = Array.from(checked).map(function(cb) {
    const type = cb.dataset.type;
    const idx  = parseInt(cb.dataset.idx);
    return type === 'caselaw' ? _wsCaseLawItems[idx].url : _wsNewsItems[idx].url;
  });

  const btn = document.getElementById('wsAssembleBtn');
  btn.disabled = true;
  wsSetStatus('info', '⏳ 正在抓取原文并组合提示词（约10-20秒）…');
  document.getElementById('ws-step3').style.display = 'none';

  try {
    const payload = { mode: 'angle_assemble', angle: _wsAngle, selectedUrls };
    const res = await fetch(GAS_URL + '?data=' + encodeURIComponent(JSON.stringify(payload)));
    const data = await res.json();

    if (!data.ok || !data.prompt) { wsSetStatus('error', '组合失败：' + (data.error || '未知错误')); btn.disabled = false; return; }

    document.getElementById('wsPromptPreview').value = data.prompt;
    document.getElementById('ws-step3').style.display = '';
    document.getElementById('ws-step3').scrollIntoView({ behavior: 'smooth', block: 'start' });
    wsSetStatus('success', '✅ 提示词已生成，可直接编辑后发送');
  } catch (err) {
    wsSetStatus('error', '网络错误：' + err.message);
  }
  btn.disabled = false;
}

async function wsSendToClaude() {
  const prompt = document.getElementById('wsPromptPreview').value;
  if (!prompt) return;
  try {
    await navigator.clipboard.writeText(prompt);
    window.open('https://claude.ai/new', '_blank');
  } catch (e) {
    wsSetStatus('error', '复制失败，请手动全选提示词文本');
  }
}

function wsReset() {
  document.getElementById('ws-step3').style.display = 'none';
  document.getElementById('ws-step2').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
